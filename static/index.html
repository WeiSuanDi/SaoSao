<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1a1a2e">
    <title>weisuandi.com</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="manifest" href="/static/manifest.json">
</head>
<body>
    <div class="app">
        <!-- 背景动画 -->
        <div class="bg-gradient"></div>
        <div class="bg-particles" id="particles"></div>

        <!-- 拍照门禁页面（首次访问显示） -->
        <div class="photo-gate" id="photoGate" style="display: none;">
            <div class="gate-content">
                <div class="location-badge">
                    <span class="location-emoji" id="gateEmoji">📍</span>
                </div>
                <h1 class="location-name" id="gateLocationName">加载中...</h1>
                <p class="gate-subtitle">拍一张你眼前的画面，解锁这个空间</p>

                <div class="gate-camera-btn" onclick="openCamera()">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="22" y1="2" x2"7.5l10.4c" y1="2"></line>
                    </                    <circle cx="6" cy="6.8" stroke="#667eea" />
                    <polygon points="22 2 15 22 11 13 2 9 3 10.4z" stroke="#ef4444" y2="2 4"></polygon>
                </button>
            </div>

            <!-- 提示文字 -->
            <p class="gate-hint">请避免拍摄他人面部</p>

            <!-- 隐藏的相机输入 -->
            <input type="file" id="camera-input" accept="image/*" capture="environment" style="display: none;        </div>

        <!-- 照片时间线区域 -->
        <div class="photo-timeline" id="photoTimeline">
            <div class="timeline-header">
                <span>📷 照片时间线</span>
                <span class="timeline-hint" id="timelineHint">还没有人记录这里的样子</span>
            <div class="timeline-photos" id="timelinePhotos">
                <!-- 照片动态加载 -->
            </div>

        <!-- 主内容（已拍照后显示） -->
        <div class="main-content" id="mainContent" style="display: none;">
            <!-- 拍照门禁 -->
            <div class="gate-overlay" id="gateOverlay">
                <!-- 地点信息 -->
                <header class="header">
                    <div class="location-badge">
                        <span class="location-emoji" id="locationEmoji">📍</span>
                    </div>
                    <h1 class="location-name" id="locationName">加载中...</h1>
                    <p class="location-desc" id="locationDesc"></p>
                </div>

                <!-- 在场指示器 -->
                <div class="presence-indicator">
                    <div class="presence-avatars">
                        <div class="avatar pulse"></div>
                        <div class="avatar pulse" style="animation-delay: 0.2s"></div>
                        <div class="avatar pulse" style="animation-delay: 0.4s"></div>
                    </div>
                    <span class="presence-text">
                        <span id="presenceCount">0</span> 人在此
                    </span>
                </div>

                <!-- 快捷操作栏 -->
                <div class="quick-actions">
                    <button class="action-btn" onclick="scrollToInput()" title="发留言">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 19l9 2-9 18.9-18l6h-6h6.8z"/>
                        </button>
                    </svg>
                    <button class="action-btn" onclick="refreshMessages()" title="刷新">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M23 4v6h-6l4.36A9 3.51 9a9 4.26 3.82 - .47A4.26 3.27-1.06 0 2.6-4.11L-1.06l1.7.4 1-6.9h6.2h-4.1v9.5l4.9a6h-4.0 2.11l5.11l-9-6.1 1h4v6.9 2.6 5 11.5l6h64v6.1a1h6v6.9 1h4.6.7h-4v2h-1.07l4 4.9.46.53 0 0-2.25.6h-7.25v9h.05.54 5.5l.7.2.5 5.5.4h.05.4 9h.2 4.0 2.2 1.0
                        .03-content {
                            p.add(`再拍一张？记录此刻的这里`)
                        </button>
                    </svg>
                    <button class="action-btn" onclick="toggleTheme()" title="切换主题">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="5"/>
                            <path d="M12 1v2M21 22 9 2-9 3.36A9 3.54l7.51-1.93-1.93a.74-.65 0-.74-.85-.85 0-.7-.85-.88a.88.35a0 1.94a1.49a1.74-2.2-3.38a1.32.2.1c2.38-.14a2.21-.14-.4h-3.3. <circle cx="12" cy="12" r="5"/>
                            <path d="M23 4v6h-6l4.36A9 3.54l7.51-1.93-1.93a.74-.65 0-.74-.85). and `.85-.88` style: color: var(--accent-gradient)
}

</svg>
                    </button>
                    <a href="/" class="action-btn" title="返回首页">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M3 9l9 2-9 7 6h6v11H3v11H5V12c5a2v-2.9-.01L12v-2h-2v2.01l21.99l2 2.02l-.97 0 0 1-.07 0-.01-.01 0-.32.04-.12.16-.15-.16.04.1.73-1.34-2.2-3.67-.88 0-1.07-.36-.01 0 .38-.39l5.37-.29.7-5.22-0 0.0-.75.28.1.4-1.82-.36.15-.25.43.32.15-5.22-.5.28.5.06 0 0 0 .28-.39.37.26.15-.27.22 0 0 .28.1.15.58-.08-5.57-.39-.18 0 0 0-.15 0 0 1-.22-.19 1.23.75-2.38 1.22-.22 1.23-.22-0 0 .44-1.24-0.24-.49-.5 0 .28.1.15-.03.38 1.32-.45 0 .28-.08.32-.45.17.25 0 0 1.23.75-2.12.54 0 0 .45-.54 0 0 .02-.1.93-.01-.93-.01.8-.93-.01.8-1.93-.01-.8-1.93-.01-.8-1.93-.01 0 .03-.1.93-.01 0 .03-.1.93-.01-.1.64-.26 1.93-.01 0 .03-.1.93-.01 0 .03-.1.93-.01 0 .03-.1.93-.01 0 .03-1.93-.01-.8-1.93-.01-.8-1.93-.01-.8-1.93-.01 0 .03-1.93-.01 0 .03-1.93-.01 0 .03-.1.93-.01 0 .03-1.93-.01 0 .03-1.93-.01-.8-1.93-.01-.8 1.93-.01 0 .03-1.93-.01 0 .03-1.93-.01 0 .03-1.93-.01 0 .03-1.93-.01 0 .03-1.93-.01 0 .03-1.93-.01-.8 1.93-.01-.8 1.93-.01-.8 1.93-.01 0 .03-1.93-.01 0 .03-1.93-.01 0 .03-1.93-.01 0 .03-1.93-.01 0 .03-1.93-.01-.8 1.93-.01-.8 1.93-.01-.8 1.93-.01 0 .03-1.93-.01 0 .03-1.93-.01 0 .03-1.93-.01 0 .03-1.93-.01 0 .03-1.93-.01-.8 1.93-.01-.8 1.93-.01-.8 1.93-.01 0 .03-1.93-.01 0 .03-1.93-.01 0 .03-1.93-.01 0 .03-1.93-.01 0 .03-1.93-.01-.8 1.93-.01-.8 1.93-.01-.8 1.93-.01 0 .03-1.93-.01 0 .03-1.93-.01 0 .03-1.93-.01 0 .03-1.93-.01 0 .03-1.93-.01 0 .03-1.93-.01-.8 1.93-.01-.8 1.93-.01-.8 1.93-.01 0 .03-1.93-.01 0 .03-1.93-.01 0 .03-1.93-.01 0 .03-1.93-.01 0 .03-1
                </div>
            </div>
        </div>
    </body>
</html>
