<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1a1a2e">
    <title>weisuandi.com</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="manifest" href="/static/manifest.json">
</head>
<body>
    <div class="app">
        <!-- 背景动画 -->
        <div class="bg-gradient"></div>
        <div class="bg-particles" id="particles"></div>

        <!-- 拍照门禁页面（首次访问显示） -->
        <div class="photo-gate" id="photoGate" style="display: none;">
            <div class="gate-content">
                <div class="location-badge">
                    <span class="location-emoji" id="gateEmoji">📍</span>
                </div>
                <h1 class="location-name" id="gateLocationName">加载中...</h1>
                <p class="gate-subtitle">拍一张你眼前的画面，解锁这个空间</p>

                <button class="gate-camera-btn" onclick="openCamera()">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
                        <circle cx="12" cy="13" r="4"></circle>
                    </svg>
                </button>

                <p class="gate-hint">请避免拍摄他人面部</p>

                <input type="file" id="camera-input" accept="image/*" capture="environment" style="display: none;">
            </div>
        </div>

        <!-- 照片时间线区域 -->
        <div class="photo-timeline" id="photoTimeline" style="display: none;">
            <div class="timeline-header">
                <span>📷 照片时间线</span>
                <span class="timeline-hint" id="timelineHint">还没有人记录这里的样子</span>
            </div>
            <div class="timeline-photos" id="timelinePhotos">
                <!-- 照片动态加载 -->
            </div>
        </div>

        <!-- 主内容（已拍照后显示） -->
        <div class="main-content" id="mainContent" style="display: none;">
            <!-- 地点信息 -->
            <header class="header">
                <div class="location-badge">
                    <span class="location-emoji" id="locationEmoji">📍</span>
                </div>
                <h1 class="location-name" id="locationName">加载中...</h1>
                <p class="location-desc" id="locationDesc"></p>
            </header>

            <!-- 在场指示器 -->
            <div class="presence-indicator">
                <div class="presence-avatars">
                    <div class="avatar pulse"></div>
                    <div class="avatar pulse" style="animation-delay: 0.2s"></div>
                    <div class="avatar pulse" style="animation-delay: 0.4s"></div>
                </div>
                <span class="presence-text">
                    <span id="presenceCount">0</span> 人在此
                </span>
            </div>

            <!-- 快捷操作栏 -->
            <div class="quick-actions">
                <button class="action-btn" onclick="scrollToInput()" title="发留言">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
                <button class="action-btn" onclick="refreshMessages()" title="刷新">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="23 4 23 10 17 10"></polyline>
                        <polyline points="1 20 1 14 7 14"></polyline>
                        <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
                    </svg>
                </button>
                <button class="action-btn" onclick="openCamera()" title="再拍一张？记录此刻的这里">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
                        <circle cx="12" cy="13" r="4"></circle>
                    </svg>
                </button>
                <button class="action-btn" onclick="toggleTheme()" title="切换主题">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="5"></circle>
                        <line x1="12" y1="1" x2="12" y2="3"></line>
                        <line x1="12" y1="21" x2="12" y2="23"></line>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                        <line x1="1" y1="12" x2="3" y2="12"></line>
                        <line x1="21" y1="12" x2="23" y2="12"></line>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                    </svg>
                </button>
                <a href="/" class="action-btn" title="返回首页">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                        <polyline points="9 22 9 12 15 12 15 22"></polyline>
                    </svg>
                </a>
            </div>

            <!-- 留言列表 -->
            <div class="messages-container">
                <div id="messages">
                    <!-- 留言卡片动态加载 -->
                </div>

                <!-- 空状态 -->
                <div class="empty-state" id="emptyState" style="display: none;">
                    <div class="empty-icon">💭</div>
                    <p>还没有人留言</p>
                    <p class="empty-hint">成为第一个留下痕迹的人吧</p>
                </div>
            </div>
        </div>

        <!-- 底部输入栏 -->
        <div class="input-bar" id="inputBar" style="display: none;">
            <div class="input-wrapper">
                <textarea
                    id="messageInput"
                    placeholder="说点什么..."
                    maxlength="280"
                    rows="1"
                ></textarea>
                <button class="send-btn" onclick="sendMessage()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </div>
            <div class="char-counter">
                <span id="charCount">0</span>/280
            </div>
        </div>

        <!-- 加载状态 -->
        <div class="loading" id="loading">
            <div class="loading-spinner"></div>
        </div>

        <!-- 404 页面 -->
        <div class="not-found" id="notFound" style="display: none;">
            <div class="not-found-content">
                <div class="not-found-icon">🔍</div>
                <h2>地点不存在</h2>
                <p>这个二维码似乎指向了一个不存在的地点</p>
                <a href="/" class="back-home-btn">返回首页</a>
            </div>
        </div>

        <!-- Toast 提示 -->
        <div class="toast" id="toast"></div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
