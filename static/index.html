<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1a1a2e">
    <title>weisuandi.com</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="manifest" href="/static/manifest.json">
</head>
<body>
    <div class="app">
        <!-- 背景动画 -->
        <div class="bg-gradient"></div>
        <div class="bg-particles" id="particles"></div>

        <!-- 主容器 -->
        <div class="container">
            <!-- 顶部区域 -->
            <header class="header">
                <div class="location-badge">
                    <span class="location-emoji" id="locationEmoji">📍</span>
                </div>
                <h1 class="location-name" id="locationName">加载中...</h1>
                <p class="location-desc" id="locationDesc"></p>

                <!-- 在场指示器 -->
                <div class="presence-indicator">
                    <div class="presence-avatars">
                        <div class="avatar pulse"></div>
                        <div class="avatar pulse" style="animation-delay: 0.2s"></div>
                        <div class="avatar pulse" style="animation-delay: 0.4s"></div>
                    </div>
                    <span class="presence-text">
                        <span id="presenceCount">0</span> 人在此
                    </span>
                </div>
            </header>

            <!-- 快捷操作栏 -->
            <div class="quick-actions">
                <button class="action-btn" onclick="scrollToInput()" title="发留言">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/>
                    </svg>
                </button>
                <button class="action-btn" onclick="refreshMessages()" title="刷新">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M23 4v6h-6M1 20v-6h6"/>
                        <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
                    </svg>
                </button>
                <button class="action-btn" onclick="toggleTheme()" title="切换主题">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="5"/>
                        <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
                    </svg>
                </button>
                <a href="/" class="action-btn" title="返回首页">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                        <polyline points="9 22 9 12 15 12 15 22"/>
                    </svg>
                </a>
            </div>

            <!-- 留言流 -->
            <div class="messages" id="messages">
                <!-- 留言卡片将在这里动态生成 -->
            </div>

            <!-- 加载动画 -->
            <div class="loading" id="loading">
                <div class="loading-spinner"></div>
                <p>加载中...</p>
            </div>

            <!-- 404 提示页 -->
            <div class="not-found" id="notFound" style="display: none;">
                <div class="not-found-icon">🗺️</div>
                <h2>这个地点还没有被开启</h2>
                <p>也许你可以去找找看有没有二维码？</p>
                <a href="/" class="back-home">返回首页</a>
            </div>

            <!-- 空状态 -->
            <div class="empty-state" id="emptyState" style="display: none;">
                <div class="empty-icon">💬</div>
                <h3>还没有人留言</h3>
                <p>来做第一个留言的人吧！</p>
            </div>

            <!-- 底部输入栏 -->
            <div class="input-bar" id="inputBar">
                <div class="input-wrapper">
                    <textarea
                        id="messageInput"
                        placeholder="在这里留下你的话..."
                        maxlength="280"
                        rows="1"
                    ></textarea>
                    <div class="char-count">
                        <span id="charCount">0</span>/280
                    </div>
                </div>
                <button class="send-btn" id="sendBtn" onclick="sendMessage()">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </div>
        </div>

        <!-- Toast 提示 -->
        <div class="toast" id="toast"></div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
